<!doctype html>
<html lang="zh-CN">
  <head>
    <link
      href="https://fonts.googleapis.com/css?family=Open+Sans:400,700"
      rel="stylesheet"
    />
    <link href="styles/style.css" rel="stylesheet" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>我喜欢你</title>
    <style>
      /* 浪漫背景效果 */
      body {
        background-image: url("images/2.png");
        background-repeat: no-repeat;
        background-size: cover;
        background-position: center center;
        background-attachment: fixed;
        width: 100%;
        min-height: 100vh;
        margin: 0;
        padding: 0;
        text-align: center;
        /* 给固定按钮预留空间，避免遮挡 */
        padding-bottom: 80px;
        font-family: "Open Sans", sans-serif;
        overflow: hidden;
      }

      /* 浪漫内容容器 */
      .content {
        background-color: rgba(255, 255, 255, 0.9);
        padding: 40px;
        max-width: 600px;
        margin: 80px auto;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        animation: fadeIn 1.5s ease-in-out;
      }

      /* 标题样式 */
      h1 {
        color: #e91e63;
        font-size: 3rem;
        margin-bottom: 30px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        animation: heartbeat 2s infinite;
      }

      /* 表白文字样式 */
      .love-text {
        font-size: 1.2rem;
        line-height: 1.8;
        color: #333;
        margin-bottom: 40px;
      }

      /* 图片样式 */
      .love-image {
        max-width: 100%;
        height: auto;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        margin: 30px 0;
        transition: transform 0.3s ease;
      }

      .love-image:hover {
        transform: scale(1.05);
      }

      /* 表白按钮样式 */
      .love-button {
        background-color: #e91e63;
        color: white;
        border: none;
        padding: 15px 30px;
        font-size: 1.1rem;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.3s ease;
        margin: 20px;
        box-shadow: 0 4px 12px rgba(233, 30, 99, 0.3);
      }

      .love-button:hover {
        background-color: #c2185b;
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(233, 30, 99, 0.4);
      }

      /* 音乐控制按钮 */
      .music-btn {
        position: fixed;
        bottom: 30px;
        right: 30px;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background-color: #e91e63;
        color: white;
        border: none;
        font-size: 24px;
        cursor: pointer;
        box-shadow: 0 4px 8px rgba(233, 30, 99, 0.3);
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
      }

      .music-btn:hover {
        background-color: #c2185b;
        transform: scale(1.1);
      }

      /* 花瓣效果 */
      .petal {
        position: absolute;
        width: 20px;
        height: 20px;
        background-color: #ff6b8b;
        border-radius: 100% 0 100% 0;
        animation: fall linear infinite;
        z-index: 1;
      }

      /* 心形效果 */
      .heart {
        position: absolute;
        width: 20px;
        height: 20px;
        background-color: #e91e63;
        transform: rotate(45deg);
        animation: float 3s ease-in-out infinite;
        z-index: 1;
      }

      .heart:before,
      .heart:after {
        content: "";
        position: absolute;
        width: 20px;
        height: 20px;
        background-color: #e91e63;
        border-radius: 50%;
      }

      .heart:before {
        top: -10px;
        left: 0;
      }

      .heart:after {
        top: 0;
        left: -10px;
      }

      /* 动画效果 */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes heartbeat {
        0% {
          transform: scale(1);
        }
        14% {
          transform: scale(1.1);
        }
        28% {
          transform: scale(1);
        }
        42% {
          transform: scale(1.1);
        }
        70% {
          transform: scale(1);
        }
      }

      @keyframes fall {
        0% {
          transform: translateY(-100vh) rotate(0deg);
          opacity: 1;
        }
        100% {
          transform: translateY(100vh) rotate(360deg);
          opacity: 0;
        }
      }

      @keyframes float {
        0%,
        100% {
          transform: rotate(45deg) translateY(0);
        }
        50% {
          transform: rotate(45deg) translateY(-10px);
        }
      }

      /* 响应式设计 */
      @media (max-width: 768px) {
        h1 {
          font-size: 2.5rem;
        }
        .content {
          padding: 30px;
          margin: 50px auto;
        }
        .love-text {
          font-size: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <!-- 音频标签：隐藏控件，初始静音 -->
    <audio id="bgMusic" src="music/bg.mp3" loop muted style="display: none">
      您的浏览器不支持音频播放
    </audio>

    <!-- 音乐控制按钮 -->
    <button id="musicControlBtn" class="music-btn">🔊</button>

    <!-- 主内容 -->
    <div class="content">
      <h1>💖 我喜欢你 💖</h1>
      <img
        id="slideshowImage"
        src="images/1.png"
        alt="我们的回忆"
        class="love-image"
      />
      <div class="love-text">
        <p>当我第一次见到你，我的心跳就漏了一拍</p>
        <p>你的笑容像阳光一样温暖，照亮了我的生活</p>
        <p>每一次和你相处的时光，都是我最珍贵的回忆</p>
        <p>我想和你一起看日出日落，一起走过春夏秋冬</p>
        <p>你愿意和我在一起吗？</p>
      </div>
      <button class="love-button" onclick="showLoveMessage()">愿意</button>
      <button class="love-button" onclick="showFriendMessage()">
        再考虑考虑
      </button>
    </div>

    <script>
      // 音乐控制
      const bgMusic = document.getElementById("bgMusic");
      const musicBtn = document.getElementById("musicControlBtn");
      let isPlaying = false;

      musicBtn.addEventListener("click", function () {
        if (isPlaying) {
          bgMusic.pause();
          musicBtn.innerText = "🔇";
          isPlaying = false;
        } else {
          bgMusic
            .play()
            .then(() => {
              bgMusic.muted = false;
              musicBtn.innerText = "🔊";
              isPlaying = true;
            })
            .catch((err) => {
              console.warn("播放失败：", err);
              alert("请允许音频播放权限后重试");
            });
        }
      });

      // 首次点击触发播放
      document.addEventListener(
        "click",
        function initPlay() {
          if (!isPlaying) {
            bgMusic.play().then(() => {
              bgMusic.muted = false;
              musicBtn.innerText = "�";
              isPlaying = true;
            });
          }
          document.removeEventListener("click", initPlay);
        },
        { once: true },
      );

      // 页面切回时恢复播放
      window.addEventListener("focus", () => {
        if (isPlaying && bgMusic.paused) {
          bgMusic.play();
        }
      });

      // 生成花瓣效果
      function createPetals() {
        const petalCount = 50;
        for (let i = 0; i < petalCount; i++) {
          const petal = document.createElement("div");
          petal.className = "petal";
          petal.style.left = Math.random() * 100 + "%";
          petal.style.animationDuration = Math.random() * 10 + 10 + "s";
          petal.style.animationDelay = Math.random() * 10 + "s";
          petal.style.opacity = Math.random() * 0.8 + 0.2;
          petal.style.transform = "scale(" + (Math.random() * 0.8 + 0.5) + ")";
          document.body.appendChild(petal);
        }
      }

      // 生成心形效果
      function createHearts() {
        const heartCount = 20;
        for (let i = 0; i < heartCount; i++) {
          const heart = document.createElement("div");
          heart.className = "heart";
          heart.style.left = Math.random() * 100 + "%";
          heart.style.top = Math.random() * 100 + "vh";
          heart.style.animationDuration = Math.random() * 4 + 2 + "s";
          heart.style.animationDelay = Math.random() * 10 + "s";
          heart.style.opacity = Math.random() * 0.6 + 0.3;
          heart.style.transform =
            "scale(" + (Math.random() * 0.5 + 0.5) + ") rotate(45deg)";
          document.body.appendChild(heart);
        }
      }

      // 显示表白成功消息
      function showLoveMessage() {
        alert("太好了！我也喜欢你！❤️\n让我们一起开启属于我们的美好时光吧！");
      }

      // 显示朋友消息
      function showFriendMessage() {
        alert("没关系，我会一直等你，直到你准备好❤️");
      }

      // 图片轮播功能
      const images = [
        "images/1.png",
        "images/firefox-icon.png",
        "images/firefox2.png",
      ];
      let currentImageIndex = 0;
      const slideshowImage = document.getElementById("slideshowImage");

      function nextImage() {
        currentImageIndex = (currentImageIndex + 1) % images.length;
        slideshowImage.src = images[currentImageIndex];
      }

      // 每3秒更换一次图片
      setInterval(nextImage, 3000);

      // 初始化效果
      window.onload = function () {
        createPetals();
        createHearts();
      };
    </script>
  </body>
</html>
